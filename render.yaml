services:
  - type: web
    name: qa365-app
    env: docker
    plan: free
    healthCheckPath: /up
    disk:
      name: qa365-data
      mountPath: /var/www/html/database
      sizeGB: 1
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: "QA365"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://qa365-app.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
