[phases.setup]
nixPkgs = ['nodejs', 'npm', 'php83', 'php83Extensions.pdo', 'php83Extensions.pdo_pgsql', 'php83Extensions.mbstring', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.zip', 'php83Extensions.bcmath']

[phases.install]
cmds = [
  'composer install --no-dev --optimize-autoloader',
  'npm install',
  'npm run build',
  'chmod +x railway-setup.sh',
  './railway-setup.sh'
]

[phases.build]
cmds = ['php artisan config:cache', 'php artisan view:cache']

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=RoleSeeder --force && php artisan db:seed --class=PermissionSeeder --force && php artisan db:seed --class=AdminSeeder --force && php artisan config:clear && php artisan serve --host=0.0.0.0 --port=$PORT"
