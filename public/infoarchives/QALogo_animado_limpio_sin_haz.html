<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA365 - Logo animado limpio sin haz de luz</title>
  <style>
    :root {
      --bg-1: #06111f;
      --bg-2: #0b1d35;
      --logo-fill: #f7fbff;
      --accent: #35f2c4;
      --glow: #39d5ff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 14%, rgba(53, 242, 196, .20), transparent 30%),
        radial-gradient(circle at 82% 72%, rgba(57, 213, 255, .20), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      background-size: 130% 130%;
      animation: backgroundDrift 10s ease-in-out infinite alternate;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .logo-stage {
      position: relative;
      width: min(78vw, 900px);
      aspect-ratio: 1562 / 699;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .logo-stage::before {
      content: "";
      position: absolute;
      inset: 17% 2%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 40% 50%, rgba(53, 242, 196, .26), transparent 58%),
        radial-gradient(circle at 70% 46%, rgba(57, 213, 255, .20), transparent 62%);
      filter: blur(34px);
      opacity: .70;
      z-index: -2;
      animation: glowPulse 3.8s ease-in-out infinite;
    }

    .qa-logo {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 18px rgba(57, 213, 255, .28));
      animation: floatLogo 5.2s ease-in-out infinite;
      transform-origin: center;
    }

    .qa-logo path {
      fill: var(--logo-fill) !important;
      stroke: none !important;
      opacity: 1 !important;
      transform-box: fill-box;
      transform-origin: center;
      animation: logoBreath 4.6s ease-in-out infinite;
      animation-delay: calc(var(--i, 0) * 70ms);
    }

    .orb {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.74);
      box-shadow: 0 0 14px rgba(57,213,255,.75);
      pointer-events: none;
      opacity: 0;
      animation: particle 6.6s linear infinite;
      z-index: -1;
    }

    @keyframes backgroundDrift {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 18px rgba(57, 213, 255, .28)); }
      50% { transform: translateY(-10px) scale(1.012); filter: drop-shadow(0 0 26px rgba(57, 213, 255, .44)); }
    }

    @keyframes logoBreath {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(57,213,255,0)); }
      50% { filter: drop-shadow(0 0 7px rgba(57,213,255,.22)); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: .48; transform: scale(.96); }
      50% { opacity: .86; transform: scale(1.08); }
    }

    @keyframes particle {
      0% { opacity: 0; transform: translate3d(0, 34px, 0) scale(.55); }
      18% { opacity: .72; }
      76% { opacity: .50; }
      100% { opacity: 0; transform: translate3d(var(--tx), -230px, 0) scale(1.16); }
    }

    @media (max-width: 700px) {
      .logo-stage { width: min(88vw, 620px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

  <script>
    const stage = document.querySelector('#logoStage');
    document.querySelectorAll('.qa-logo path').forEach((path) => {
      const part = Number(path.dataset.part || 0);
      path.style.setProperty('--i', part);
    });

    for (let i = 0; i < 22; i++) {
      const orb = document.createElement('span');
      orb.className = 'orb';
      orb.style.left = `${8 + Math.random() * 84}%`;
      orb.style.top = `${60 + Math.random() * 26}%`;
      orb.style.setProperty('--tx', `${-90 + Math.random() * 180}px`);
      orb.style.animationDelay = `${Math.random() * 6}s`;
      orb.style.animationDuration = `${4.8 + Math.random() * 3.8}s`;
      stage.appendChild(orb);
    }
  </script>
